# =================================================================================================
# EURO HUNTER CONFIGURATION: AI-Powered EUR-USD Bottom Detection System
# =================================================================================================
# This configuration trains an evolutionary neural network to identify high-probability
# bottom reversal points in EUR-USD (4-hour timeframe). It combines fundamental drivers,
# market positioning, liquidity conditions, and cross-market relationships into a unified model.
#
# KEY INSIGHTS EMBEDDED:
# - EUR-USD is 90% driven by interest rate differentials (Tier 1)
# - Bottoms occur when positioning reaches extremes (Tier 2)
# - Reversals need liquidity fuel (Tier 3)
# - Technicals provide precise timing (Tier 4)
# - Cross-market context confirms regime shifts (Tiers 5-7)
# =================================================================================================
# Note: this one is heavily commented by AI. Didnt check it.
# Note: this one works actually pretty good
# Note: some example connectors used in this file will eventually move to system-indicatos
# Note: reason for move of connectors is the need to numba-jit optimize them

Euro-51:
  type: MilkyWay
  fabric:
    matter: EUR-USD/4h                        # Trading instrument and timeframe
    after: 2024-01-01                         # Training data start
    until: 2025-12-31                         # Training data end

  flight:
    type: MilleniumFalcon
    settings:
      max_generations: 5000                   # Total evolutionary generations
      extinction_stagnation: 200              # Kill species if no improvement for 200 gens
      radiation_stagnation: 100               # Introduce radiation if stagnant for 100 gens
      gene_count: 24                          # Number of features per model (increased for signal diversity)
      vitality_decay: 0.75                    # How quickly old gene importance fades
      population_size: 1200                   # Number of concurrent models in evolution
      hidden_dim: 128                         # Neural network hidden layer size
      hotness_max: 87                         # Upper threshold for feature selection
      hotness_min: 80                         # Lower threshold for feature selection
      gpu_chunk: 384                          # Batch size for GPU processing
      min_signals: 6                          # Minimum signals required for valid prediction
      target_density: 0.005                   # Expected frequency of bottom events (0.5% of bars)
      precision_exp: 4                        # Exponential penalty for false positives
      penalty_coeff: 2.0                      # Strength of density penalty
      thresh_steps: 31                        # Threshold optimization steps
      verbose: true                           # Enable detailed logging
      oos_boundary: 0.70                      # 70/30 train/test split
      epochs: 150                             # Training epochs per generation
      weight_mutation_rate: 0.005             # Neural weight mutation strength
      save_metric: f1                         # Save based on F1 score
      save_best_only: true                    # Only keep champion models

  singularity:
    type: Pulsar
    device: cuda
    lens:
      type: Gravitational                     # Loss function type
      alpha: 0.99                             # Gravitational pull strength
      gamma: 2.0                              # Gradient scaling factor

  center:
    - example-pivot-finder_35_bottoms         # Target labels

  normalizers:
    Kinematics: 
      type: Kinematics
      disabled: true                          # Disabled - not needed for this config
    Redshift: 
      type: Redshift
      dim: 0                                  # Normalize across time dimension
      eps: 1e-8                               # Numerical stability epsilon

  comets:
    - HaleBopp                                # Periodic population refresh
    - config.user.ml.comets.Halley            # Custom Halley comet for diversity

  filter:
    - open                                    # Exclude OHLCV data
    - high
    - low
    - close
    - volume
    - symbol                                  # Strip symbol context
    - timeframe                               # Strip timeframe context
    - '*direction*'                           # Strip direction labels if present

  features:
    # ============================================================
    # TIER 1: INTEREST RATE DYNAMICS (Primary Driver)
    # ============================================================
    # EUR-USD is fundamentally a play on interest rate expectations.
    # These features capture the core driver of currency values.
    - example-rate-differential_EUR_USD_2y                  # 2-year swap differential (rate expectations)
    - example-rate-differential_EUR_USD_10y                 # 10-year yield differential (long-term carry)
    - example-rate-expectation-change_3m                    # 3-month forward rate shift (momentum of expectations)
    - example-central-bank-balance-sheet-ratio_ECB_FED      # Relative central bank balance sheets (liquidity advantage)

    # ============================================================
    # TIER 2: POSITIONING EXTREMES (Capitulation Signals)
    # ============================================================
    # Bottoms happen when everyone who wanted to sell has already sold.
    # These features detect when positioning reaches extremes.
    - example-cot-commercial-net_EUR                        # Commercial hedgers net position (smart money)
    - example-cot-noncommercial-net_EUR                     # Speculators net position (dumb money)
    - example-cot-commercial-vs-price-divergence_20         # When commercials diverge from price (strong signal)
    - example-option-put-call-ratio_EUR                     # Options market sentiment (fear/greed)

    # ============================================================
    # TIER 3: LIQUIDITY CONDITIONS (The Fuel)
    # ============================================================
    # Even with perfect setup, a reversal needs liquidity fuel.
    # These features track the availability and cost of funding.
    - example-cross-currency-basis_EURUSD_3m                # EUR/USD cross-currency basis (funding pressure)
    - example-ted-spread_US                                 # TED spread (banking system stress)
    - example-usd-liquidity-index_FED-repo                  # USD liquidity conditions (repo market)

    # ============================================================
    # TIER 4: TRADITIONAL TECHNICALS (Timing)
    # ============================================================
    # Fundamentals tell you WHAT should happen, technicals tell you WHEN.
    # These provide precise entry timing.
    
    # Oversold (reversal candidates)
    - williamsr_14                                          # Williams %R (oversold momentum)
    - cci_20                                                # Commodity Channel Index (mean reversion)
    - stoch_14_3_3                                          # Stochastic oscillator (momentum exhaustion)
    
    # Momentum (velocity/acceleration)
    - uo_7_14_20                                            # Ultimate Oscillator (multi-timeframe momentum)
    - ppo_12_26_9                                           # Percentage Price Oscillator (momentum with signal)
    - roc_14                                                # Rate of Change (raw momentum)
    
    # Volatility (compression/expansion)
    - atrp_14                                               # Average True Range percentage (volatility level)
    - volatility-ratio_20_2.0_1.0                           # Volatility ratio (regime detection)
    - choppiness_10                                         # Choppiness Index (trending vs ranging)
    
    # Trend Context (direction filter)
    - adx_14                                                # Average Directional Index (trend strength)
    - kaufman-er_10                                         # Kaufman Efficiency Ratio (trend efficiency)

    # ============================================================
    # TIER 5: CROSS-MARKET RSI (Selective)
    # ============================================================
    # RSI on related markets provides context about broader market conditions.
    # Each returns 4 timeframes: 1W, 1d, 4h, 1h
    - example-multi-tf-rsi_EUR-USD_14_14_14_14             # Primary pair RSI
    - example-multi-tf-rsi_DOLLAR.IDX-USD_14_14_14_14      # Dollar index RSI (inverse correlation)
    - example-multi-tf-rsi_XAU-USD_14_14_14_14             # Gold RSI (safe haven alternative)
    - example-multi-tf-rsi_USA500.IDX-USD_14_14_14_14      # S&P 500 RSI (risk sentiment)
    - example-multi-tf-rsi_VOL.IDX-USD_14_14_14_14         # VIX RSI (fear gauge)

    # ============================================================
    # TIER 6: KEY DIVERGENCES (8 Most Predictive)
    # ============================================================
    # Divergences occur when price makes a new low but indicators don't.
    # These are among the most reliable bottom signals.
    - example-cross-divergence_EUR-USD_DOLLAR.IDX-USD_20_rsi_14      # EUR vs Dollar Index divergence
    - example-cross-divergence_EUR-USD_XAU-USD_20_rsi_14             # EUR vs Gold divergence (safe haven flow)
    - example-cross-divergence_EUR-USD_USA500.IDX-USD_20_rsi_14      # EUR vs S&P divergence (risk correlation)
    - example-cross-divergence_EUR-USD_VOL.IDX-USD_20_rsi_14         # EUR vs VIX divergence (fear response)
    - example-cross-divergence_EUR-USD_USTBOND.TR-USD_20_rsi_14      # EUR vs US Bonds divergence (yield play)
    - example-cross-divergence_USD-CHF_USD-JPY_20_rsi_14             # Swissie vs Yen divergence (safe haven battle)
    - example-cross-divergence_EUR-USD_GBP-USD_20_rsi_14             # EUR vs GBP divergence (European correlation)
    - example-cross-divergence_USTBOND.TR-USD_BUND.TR-EUR_20_rsi_14  # US vs German bonds divergence (rate differential)

    # ============================================================
    # TIER 7: CORRELATION REGIMES (Selective)
    # ============================================================
    # Correlations aren't static - they break during major reversals.
    # These features detect when normal relationships change.
    
    # Breaks for structural relationships (regime change detection)
    - example-corr-break_EUR-USD_DOLLAR.IDX-USD_20_50_rsi_14      # When EUR-DXY correlation breaks (strong signal)
    - example-corr-break_EUR-USD_XAU-USD_20_50_rsi_14             # When EUR-Gold correlation breaks (safe haven shift)
    
    # Rolling for tactical relationships (current state)
    - example-corr-rolling_EUR-USD_USA500.IDX-USD_20_close        # EUR vs Equities correlation
    - example-corr-rolling_EUR-USD_USD-JPY_20_close               # EUR vs Yen correlation (risk sentiment)
    - example-corr-rolling_XAU-USD_USA500.IDX-USD_20_close        # Gold vs Equities (risk-on/off regime)