# =================================================================================================
# EUR HUNTER CONFIGURATION: AI-Powered EUR-USD Bottom Detection System
# =================================================================================================
# Trains an evolutionary neural network to detect high-probability
# bottom reversals on EUR-USD using a 4-hour timeframe.
# The model blends momentum, volatility, trend, regime, and cross-market context.
# =================================================================================================
#
# Note: THIS IS AN EXTREME-MODEL AND EUR-USD SPECIFIC. IT SEVERELY PENALIZES NON-PRECISION
#       IT WILL TAKE A LOT OF YOUR GPU. USE NVTOP TO CHECK MEMORY USAGE. ADJUST GPU_CHUNK
#       CHUNK SIZE TO CONSUME YOUR NVRAM FOR 80-90%. THIS IS A LONGRUNNER. BUT PRECISE.

# NOTE: YOU NEED THE BONDS, CONFIGURE IN YOUR SYMBOLS.USER.TXT, AND PANAMA FOR THIS ONE.

# ./build-sidetracking-config.sh --symbol BUND.TR-EUR-PANAMA --source BUND.TR-EUR \
# --class generators.sidetracking.extensions.dukascopy.DukascopyPanamaStrategy \
# --output config.user/dukascopy/sidetracking/BUND.TR-EUR-PANAMA.yaml

# ./build-sidetracking-config.sh --symbol USTBOND.TR-USD-PANAMA --source USTBOND.TR-USD \
# --class generators.sidetracking.extensions.dukascopy.DukascopyPanamaStrategy \
# --output config.user/dukascopy/sidetracking/USTBOND.TR-USD-PANAMA.yaml

# ./rebuild-full.sh --symbol BUND.TR-EUR --symbol USTBOND.TR-USD

EUR:                               # Root experiment namespace
  type: MilkyWay                   # Declares a multi-component / multi-stage ML pipeline

  fabric:                          # Data source and time window configuration
    matter: EUR-USD/1d             # Trading instrument and timeframe
    after: 2023-01-01              # Start date for historical data (prevents look-ahead bias)
    until: 2025-12-31              # End date for historical data

  flight:                          # Evolutionary training engine
    type: MilleniumFalcon          # Evolutionary neural network optimizer
    settings:
      max_generations: 5000        # Maximum evolutionary iterations
      extinction_stagnation: 200   # Kill population if no improvement for N generations
      radiation_stagnation: 100    # Increase mutation pressure after stagnation
      gene_count: 10               # Number of genes (sub-networks / feature groups)
      vitality_decay: 0.40         # Penalizes overly complex or stale genomes
      population_size: 2500        # Number of candidate models per generation
      hidden_dim: 128              # Hidden layer width for neural networks
      hotness_max: 87              # Upper bound for signal aggressiveness
      hotness_min: 80              # Lower bound for signal aggressiveness
      gpu_chunk: 500               # Batch size for GPU evaluation
      min_signals: 8               # Minimum number of signals required to act
      target_density: 0.025        # Desired signal frequency (controls overtrading)
      precision_exp: 10            # Exponent applied to precision during fitness scoring
      penalty_coeff: 4.5           # Penalty for false positives / noisy signals
      thresh_steps: 201            # Threshold sweep resolution for signal calibration
      verbose: true                # Enables detailed training logs
      oos_boundary: 0.70           # Out-of-sample performance cutoff
      epochs: 250                  # Training epochs per generation
      weight_mutation_rate: 0.002  # Probability of mutating network weights
      save_metric: f1              # Metric used to rank and save models
      save_best_only: true         # Persist only the best-performing genome

  singularity:                     # Model execution and inference environment
    type: Pulsar                   # High-throughput inference engine
    device: cuda                   # Runs on GPU
    lens:                          # Output shaping / probability calibration
      type: Gravitational
      alpha: 0.99                  # Exponential smoothing factor
      gamma: 2.0                   # Nonlinear confidence amplification

  center:                          # Ground-truth or label generators
    - example-pivot-finder_10_bottoms
                                   # Provides historical bottom labels using pivot logic

  normalizers:                     # Feature normalization stage
    Redshift:
      type: Redshift               # Zero-mean / variance-stabilizing normalizer
      dim: 0                       # Normalize along feature dimension
      eps: 1e-8                    # Numerical stability constant

  comets:                          # Auxiliary signal injectors / observers
    - HaleBopp                     # Example built-in comet module
    - config.user.ml.comets.Halley # User-defined comet module

  filter:                          # Columns explicitly allowed into the model
    - open                         # Candle open price
    - high                         # Candle high price
    - low                          # Candle low price
    - close                        # Candle close price
    - volume                       # Trade volume
    - symbol                       # Instrument identifier
    - timeframe                    # Timeframe metadata
    - '*direction*'                # Any feature containing "direction"
    - '*chikou*'                   # Ichimoku chikou span related fields

  features:                        # Feature engineering layer
                                   # All features are numeric and time-aligned

    # 1. OVERSOLD CONFIRMATION (Cable-specific volatility behavior)
    - williamsr_14                 # Momentum-based oversold indicator
    - cci_20                       # Commodity Channel Index for deviation extremes
    - stochastic_5_3_3             # Fast stochastic oscillator (array-based)
    - rsi_14                       # Relative Strength Index (array-based)

    # 2. BUY / SELL PRESSURE
    - mfi_14                       # Money Flow Index (price + volume)
    - cmf_20                       # Chaikin Money Flow (accumulation/distribution)

    # 3. STATISTICAL MEAN REVERSION & VOLATILITY
    - zscore_20                    # Normalized deviation from rolling mean
    - bbands_20_2.0                # Bollinger Bands (array-based)
    - bbands-width_20_2.0          # Bollinger Band width (volatility proxy)

    # 4. MOMENTUM & VELOCITY
    - uo_7_14_20                   # Ultimate Oscillator (multi-timeframe momentum)
    - ppo_12_26_9                  # Percentage Price Oscillator
    - roc_14                       # Rate of Change

    # 5. VOLATILITY REGIME
    - atr_14                       # Average True Range (array-based)
    - atrp_14                      # ATR normalized by price
    - volatility-ratio_20_2.0_1.0  # Short vs long volatility comparison
    - choppiness_14                # Trend vs range regime classifier

    # 6. TREND CONTEXT
    - adx_14                       # Trend strength (array-based)
    - aroon_14                     # Trend direction and exhaustion (array-based)
    - kaufman-er_10                # Market efficiency ratio
    - fractaldimension_30          # Market roughness / complexity
    - psar_0.02_0.2                # Parabolic SAR
    - ichimoku_9_26_52             # Ichimoku cloud components
    - mcginley_14                  # Adaptive moving average
    - kalman_1e-5_0.01             # Kalman filter trend estimator

    # 7. CROSS-SYMBOL CONTEXT (Intermarket confirmation)
    - example-multi-tf-rsi_EUR-USD_14_14_14_14
                                   # Multi-timeframe RSI on EUR-USD
    - example-multi-tf-rsi_DOLLAR.IDX-USD_14_14_14_14
                                   # Dollar strength / weakness proxy
    - example-multi-tf-rsi_BUND.TR-EUR_14_14_14_14
    - example-multi-tf-rsi_USTBOND.TR-USD-PANAMA_14_14_14_14
    # 8. CROSS-SYMBOL DIVERGENCES
    - example-cross-divergence_EUR-USD_DOLLAR.IDX-USD_20_rsi_14
                                   # EUR vs DXY RSI divergence
    - example-cross-divergence_BUND.TR-EUR-PANAMA_USTBOND.TR-USD-PANAMA_20_rsi_14
                                   # UK vs US yield divergence (macro risk signal)