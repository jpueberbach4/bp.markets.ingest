MilkyWay:
  type: MilkyWay
  fabric:
    matter: EUR-USD/4h
    after: 2022-01-01
    until: 2025-12-31

  flight:
    type: MilleniumFalcon
    settings:
      max_generations: 5000
      extinction_stagnation: 200
      radiation_stagnation: 100
      gene_count: 24  # Increased to 24 to handle more cross-symbol features
      vitality_decay: 0.75
      population_size: 1000
      hidden_dim: 128
      hotness_max: 87
      hotness_min: 80
      gpu_chunk: 500
      min_signals: 6  # Slightly higher to maintain sparsity with more genes
      target_density: 0.005
      precision_exp: 4
      penalty_coeff: 2.0
      thresh_steps: 31
      verbose: true
      oos_boundary: 0.70
      epochs: 50
      weight_mutation_rate: 0.005

  singularity:
    type: Pulsar
    device: cuda

  center:
    - example-pivot-finder_30_bottoms

  normalizers:
    Kinematics: 
      type: Kinematics
      disabled: true
      filter:
        inclusive:
        - '*EUR*rsi*'
        - '*DOLLAR*rsi*'
    Redshift: 
      type: Redshift
      dim: 0 
      eps: 1e-8

  comets:
    - HaleBopp
    # Custom comets
    # A custom commet can be used for additional monitoring/persistency. They are asynchronous 
    # objects and there is no guarantee they will get called in the order specified. 
    # - config.user.ml.comets.Halley

  filter:
    - open
    - high
    - low
    - close
    - volume
    - symbol
    - timeframe
    - '*direction*'

  features:
    # 1. OVERSOLD CONFIRMATION
    - williamsr_14
    - cci_20

    # 2. VOLUME & BUY/SELL PRESSURE
    - mfi_14
    - obv
    - adl
    - chaikin_3_10
    - eom_14
    - vwma_20

    # 3. MEAN REVERSION ZONES
    - zscore_20
    - bbands_20_2.0
    - bbands-width_20_2.0
    - keltner_20_1.5
    - donchian_20
    - donchian-width_20

    # 4. DIVERGENCE DETECTORS
    - macd_12_26_9
    - uo_7_14_20

    # 5. VOLATILITY REGIME
    - atr_14
    - atrp_14
    - volatility-ratio_20_2.0_1.0
    - choppiness_10
    - vqi_14

    # 6. TREND & MOMENTUM CONTEXT
    - adx_14
    - aroon_14
    - kaufman-er_10
    - fractaldimension_30
    - hma_9

    # 7. CROSS-SYMBOL CONTEXT (Multi-TF RSI)
    - example-multi-tf-rsi_GBP-USD_14_14_14_14
    - example-multi-tf-rsi_USD-JPY_14_14_14_14
    - example-multi-tf-rsi_EUR-USD_14_14_14_14
    - example-multi-tf-rsi_USD-CHF_14_14_14_14
    - example-multi-tf-rsi_XAU-USD_14_14_14_14
    - example-multi-tf-rsi_DOLLAR.IDX-USD_14_14_14_14
    - example-multi-tf-rsi_USTBOND.TR-USD_14_14_14_14
    - example-multi-tf-rsi_BUND.TR-EUR_14_14_14_14
    - example-multi-tf-rsi_USA500.IDX-USD_14_14_14_14
    - example-multi-tf-rsi_VOL.IDX-USD_14_14_14_14
    - example-multi-tf-rsi_DEU.IDX-EUR_14_14_14_14

    # 8. CROSS-SYMBOL DIVERGENCES (NEW - replacing SMA distances)
    # USD Strength Divergences
    - example-cross-divergence_EUR-USD_DOLLAR.IDX-USD_20_rsi_14
    - example-cross-divergence_EUR-USD_USD-CHF_20_rsi_14
    - example-cross-divergence_EUR-USD_USD-JPY_20_rsi_14
    
    # Safe Haven Divergences
    - example-cross-divergence_EUR-USD_XAU-USD_20_rsi_14
    - example-cross-divergence_USD-CHF_XAU-USD_20_rsi_14
    
    # Risk Sentiment Divergences
    - example-cross-divergence_EUR-USD_USA500.IDX-USD_20_rsi_14
    - example-cross-divergence_EUR-USD_VOL.IDX-USD_20_rsi_14
    - example-cross-divergence_USA500.IDX-USD_VOL.IDX-USD_20_rsi_14
    
    # Bond Market Divergences
    - example-cross-divergence_EUR-USD_USTBOND.TR-USD_20_rsi_14
    - example-cross-divergence_EUR-USD_BUND.TR-EUR_20_rsi_14
    - example-cross-divergence_USTBOND.TR-USD_BUND.TR-EUR_20_rsi_14
    
    # Cross-Currency Divergences
    - example-cross-divergence_EUR-USD_GBP-USD_20_rsi_14
    - example-cross-divergence_USD-CHF_USD-JPY_20_rsi_14
    
    # European Risk Divergences
    - example-cross-divergence_EUR-USD_DEU.IDX-EUR_20_rsi_14
    - example-cross-divergence_DEU.IDX-EUR_BUND.TR-EUR_20_rsi_14

    # 9. REMAINING STATIONARY FEATURES
    - vwap
